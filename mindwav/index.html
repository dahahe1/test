<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
  <title>GXC Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">
    LOADING...
  </div>

  <canvas
    class="emscripten"
    id="canvas"
    oncontextmenu="event.preventDefault()"
    tabindex="-1"
  ></canvas>

  <div id="pauseMenuContainer" hidden>
    <div id="pauseMenuBorder">
      <div id="pauseMenu">
        <button id="resumeButton" onclick="resume()">Resume</button>
        <button id="quitButton" onclick="quitIfSupported()">Quit</button>
      </div>
    </div>
  </div>

  <div class="loading">
    <div class="spinner" id="spinner"></div>
    <div class="emscripten" id="status">Downloading...</div>
    <progress value="0" max="100" id="progress" hidden="1"></progress>
    <img id="QRCode" class="qrCode" src="runner.svg" alt="URL QR Code" hidden="1">
    <img id="QR2Code" class="qrCode" src="runnerLocal.svg" alt="URL QR2 Code" hidden="1">
  </div>

  <div class="wallpaper-container" id="wallpaper-container" style="display: none">
    <button class="output-button" onclick="toggleElement('wallpaper-config-iframe')">Toggle configurator</button>
  </div>

  <iframe class="floating-control" id="wallpaper-config-iframe" src="about:blank"></iframe>

  <div id="message-container">
    <div id="messages"></div>
  </div>

  <script>
    // Simple — use the single game.unx file you already have.
    const loadingtext = document.getElementById('loading-text');
    loadingtext.textContent = 'be like really patient this game is big so wait a bit';

    // The URL for your single file (relative path). Change if it's in a subfolder.
    window.gameUnxUrl = 'game.unx';

    // OPTIONAL: redirect any requests for "game.unx" to the single file above.
    // Remove this block if you don't want any interception.
    (function() {
      const originalFetch = window.fetch;
      window.fetch = function(input, init) {
        try {
          let urlString = input instanceof Request ? input.url : String(input);
          if (urlString.includes('game.unx') && urlString !== window.gameUnxUrl) {
            if (input instanceof Request) input = new Request(window.gameUnxUrl, input);
            else input = window.gameUnxUrl;
          }
        } catch (e) {
          // ignore and continue with original input
        }
        return originalFetch.call(this, input, init);
      };

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        try {
          if (typeof url === 'string' && url.includes('game.unx') && url !== window.gameUnxUrl) {
            url = window.gameUnxUrl;
          }
        } catch (e) {
          // ignore
        }
        return originalOpen.call(this, method, url, ...rest);
      };
    })();

    // Append the same scripts your runner expects (unchanged)
    // Note: keep the 'javascript/worker' type if your loader relies on it.
    (function appendScripts() {
      const twReal = document.createElement('script');
      twReal.src = 'realtickworker.js';
      twReal.type = 'javascript/worker';
      twReal.id = 'tick-worker';
      document.body.appendChild(twReal);

      const tw = document.createElement('script');
      tw.src = 'tickworker.js';
      document.body.appendChild(tw);

      const index = document.createElement('script');
      index.src = 'index.js';
      document.body.appendChild(index);

      const runner = document.createElement('script');
      runner.src = 'runner.js';
      document.body.appendChild(runner);
    })();

    // Let your runner remove the loading text when ready.
  </script>
</body>
</html>
